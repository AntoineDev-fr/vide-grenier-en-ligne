name: videgrenier-recette

services:
  web-recette:
    build:
      context: .
      dockerfile: dockerfile
    container_name: videgrenier_web_recette
    environment:
      APP_ENV: recette
      APP_SHOW_ERRORS: "true"
      DB_HOST: db-recette
      DB_NAME: videgrenier_recette
      DB_USER: user
      DB_PASSWORD: password
    ports:
      - "8002:80"
    depends_on:
      db-recette:
        condition: service_healthy

  db-recette:
    image: mysql:5.7
    container_name: videgrenier_db_recette
    restart: always
    environment:
      MYSQL_DATABASE: videgrenier_recette
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - ./sql/import.sql:/docker-entrypoint-initdb.d/import.sql:ro
      - db_recette_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_recette_data:
