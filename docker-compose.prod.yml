name: videgrenier-prod

services:
  web-prod:
    build:
      context: .
      dockerfile: dockerfile
    container_name: videgrenier_web_prod
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_SHOW_ERRORS: "false"
      DB_HOST: db-prod
      DB_NAME: videgrenier_prod
      DB_USER: user
      DB_PASSWORD: password
    ports:
      - "8003:80"
    depends_on:
      db-prod:
        condition: service_healthy

  db-prod:
    image: mysql:5.7
    container_name: videgrenier_db_prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: videgrenier_prod
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3309:3306"
    volumes:
      - ./sql/import.sql:/docker-entrypoint-initdb.d/import.sql:ro
      - db_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_prod_data:
